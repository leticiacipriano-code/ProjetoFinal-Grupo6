version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: glow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glow1234}
      POSTGRES_DB: ${POSTGRES_DB:-glow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glow} -d ${POSTGRES_DB:-glow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
